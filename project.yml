name: TooDue
options:
  bundleIdPrefix: com.toodue
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  TooDue:
    type: application
    platform: iOS
    sources:
      - path: TooDue
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toodue.ios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TooDue
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # Self-hosted servers are often plain-HTTP on a LAN; let the user decide.
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets:
        - TooDueTests
  TooDueTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TooDueTests
    dependencies:
      - target: TooDue
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
